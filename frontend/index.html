<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Erlang Counter</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 56px 64px;
            text-align: center;
            min-width: 340px;
        }

        .label {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .sublabel {
            font-size: 0.7rem;
            color: #484f58;
            margin-bottom: 48px;
        }

        .value {
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 48px;
            font-variant-numeric: tabular-nums;
            color: #f0f6fc;
            min-height: 1em;
            transition: color 0.15s;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: filter 0.12s, transform 0.08s;
        }
        button:hover  { filter: brightness(1.15); }
        button:active { transform: scale(0.93); }

        .btn-dec, .btn-inc {
            background: #1f6feb;
            color: #fff;
            font-size: 1.8rem;
            width: 60px;
            height: 60px;
        }

        .btn-reset {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0 18px;
            height: 60px;
        }

        .status {
            margin-top: 28px;
            font-size: 0.78rem;
            color: #f85149;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">Erlang Counter</div>
        <div class="sublabel">gen_server &rarr; HTTP &rarr; WebAssembly</div>

        <div id="counter-value" class="value">—</div>

        <div class="controls">
            <button class="btn-dec" onclick="Module.ccall('decrement', null, [], [])">−</button>
            <button class="btn-reset" onclick="Module.ccall('reset_counter', null, [], [])">Reset</button>
            <button class="btn-inc" onclick="Module.ccall('increment', null, [], [])">+</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        /* Set up the Module object before the Emscripten glue script loads so
           onRuntimeInitialized fires once the WASM is ready. */
        var Module = {
            onRuntimeInitialized: function () {
                Module.ccall('refresh', null, [], []);
            }
        };
    </script>
    <script src="counter.js"></script>
</body>
</html>
