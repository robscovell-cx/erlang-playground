<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Erlang Counter</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 56px 64px;
            text-align: center;
            min-width: 340px;
        }

        .label {
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 4px;
        }

        .sublabel {
            font-size: 0.7rem;
            color: #484f58;
            margin-bottom: 32px;
        }

        .value {
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 48px;
            font-variant-numeric: tabular-nums;
            color: #f0f6fc;
            min-height: 1em;
            transition: color 0.15s;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="text"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 0.9rem;
            padding: 10px 14px;
            margin-bottom: 20px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #1f6feb; }

        button {
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: filter 0.12s, transform 0.08s;
        }
        button:hover  { filter: brightness(1.15); }
        button:active { transform: scale(0.93); }

        .btn-dec, .btn-inc {
            background: #1f6feb;
            color: #fff;
            font-size: 1.8rem;
            width: 60px;
            height: 60px;
        }

        .btn-reset {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0 18px;
            height: 60px;
        }

        .btn-primary {
            background: #1f6feb;
            color: #fff;
            font-size: 0.85rem;
            padding: 12px 20px;
            flex: 1;
        }

        .btn-signout {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 8px 16px;
            margin-top: 28px;
        }

        .status {
            margin-top: 28px;
            font-size: 0.78rem;
            color: #f85149;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

    <!-- Auth panel — shown until logged in -->
    <div id="auth-panel" class="card" style="display:none">
        <div class="label">Counter App</div>
        <div class="sublabel">Sign in with a passkey</div>
        <input id="username-input" type="text" placeholder="Username"
               autocomplete="username webauthn" />
        <div class="controls">
            <button class="btn-primary"
                    onclick="Module.ccall('auth_register',null,[],[])">Register Passkey</button>
            <button class="btn-primary"
                    onclick="Module.ccall('auth_login',null,[],[])">Sign In</button>
        </div>
        <div id="auth-status" class="status"></div>
    </div>

    <!-- Counter panel — shown when logged in -->
    <div id="counter-panel" class="card" style="display:none">
        <div class="label">Erlang Counter</div>
        <div id="current-user" class="sublabel"></div>

        <div id="counter-value" class="value">—</div>

        <div class="controls">
            <button class="btn-dec" onclick="Module.ccall('decrement', null, [], [])">−</button>
            <button class="btn-reset" onclick="Module.ccall('reset_counter', null, [], [])">Reset</button>
            <button class="btn-inc" onclick="Module.ccall('increment', null, [], [])">+</button>
        </div>

        <div id="status" class="status"></div>

        <button class="btn-signout"
                onclick="Module.ccall('auth_logout',null,[],[])">Sign Out</button>
    </div>

    <script>
        var Module = {
            onRuntimeInitialized: function() {
                if (Module.ccall('auth_is_logged_in', 'number', [], []) === 1) {
                    Module.showCounterPanel('');
                } else {
                    document.getElementById('auth-panel').style.display = 'block';
                }
            },
            showAuthPanel: function() {
                document.getElementById('counter-panel').style.display = 'none';
                document.getElementById('auth-panel').style.display   = 'block';
                document.getElementById('auth-status').textContent    = '';
            },
            showCounterPanel: function(username) {
                document.getElementById('auth-panel').style.display    = 'none';
                document.getElementById('counter-panel').style.display = 'block';
                if (username) {
                    document.getElementById('current-user').textContent = username;
                }
                Module.ccall('refresh', null, [], []);
            }
        };
    </script>
    <script src="counter.js"></script>
</body>
</html>
