services:
  - name: counter
    path: "erlang/counter.erl"
    purpose: "gen_server wrapping a Mnesia-backed integer counter; survives restarts"
    api:
      - "start_link/0 → register as {local, counter}"
      - "increment/0  → cast {update, +1}"
      - "decrement/0  → cast {update, -1}"
      - "reset/0      → cast reset (writes 0 to Mnesia)"
