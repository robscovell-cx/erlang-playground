services:
  - name: counter
    path: "erlang/counter.erl"
    purpose: "gen_server wrapping per-user Mnesia-backed integer counters; survives restarts"
    api:
      - "start_link/0 → register as {local, counter}"
      - "increment/1(User) → cast {update, User, +1}"
      - "decrement/1(User) → cast {update, User, -1}"
      - "reset/1(User)     → cast {reset, User} (writes 0 to Mnesia)"
      - "value/1(User)     → call {value, User}; reads from Mnesia transaction"
    state: "ok (placeholder — real state is Mnesia table 'counter')"
    mnesia:
      table: counter
      key: "User (any term — username binary or atom 'default')"
      fields: [key, value]
      storage: disc_copies

  - name: auth
    path: "erlang/auth.erl"
    purpose: "gen_server owning four WebAuthn Mnesia tables; API functions use dirty ops directly"
    api:
      - "start_link/0"
      - "create_challenge/2(Username, Kind) → {ok, ChallengeB64}"
      - "consume_challenge/2(ChallengeB64, Kind) → {ok, Username} | {error, not_found|expired}"
      - "register_credential/4(Username, CredId, PubKey, SignCount) → ok"
      - "find_credential/1(CredIdRaw) → {ok, Map} | {error, not_found}"
      - "credentials_for_user/1(Username) → [Map]"
      - "update_sign_count/2(CredId, NewCount) → ok"
      - "create_session/1(Username) → {ok, Token}"
      - "validate_session/1(Token) → {ok, Username} | {error, invalid|expired}"
      - "delete_session/1(Token) → ok"
      - "user_exists/1(Username) → boolean()"
    state: "ok (placeholder — real state is Mnesia tables)"
    mnesia:
      tables:
        - name: webauthn_user
          key: username
          fields: [username, created_at]
          storage: disc_copies
        - name: webauthn_credential
          key: credential_id
          fields: [credential_id, username, public_key, sign_count, created_at]
          index: [username]
          storage: disc_copies
        - name: webauthn_challenge
          key: challenge (raw bytes)
          fields: [challenge, username, kind, created_at]
          ttl: 300s
          storage: disc_copies
        - name: webauthn_session
          key: token
          fields: [token, username, expires_at]
          ttl: 3600s
          storage: disc_copies
    background: "hourly purge of expired sessions via send_after + handle_info"

  - name: counter_server
    path: "erlang/counter_server.erl"
    purpose: "Raw TCP server (port 9090); line-protocol bridge to counter gen_server; uses 'default' user key"
    protocol: "Newline-terminated command; replies with value or 'ok'"
    commands: [increment, decrement, reset, value]

  - name: counter_http
    path: "erlang/counter_http.erl"
    purpose: "HTTP/1.1 server (port 8080); starts counter + auth gen_servers; serves counter API and static frontend"
    auth: "Session token in HttpOnly 'session' cookie; collect_headers/2 extracts it via parse_session_cookie/1; validate_session extracts Username for counter key"
    notes: "Uses {packet, http_bin} for request parsing; collect_headers/2 accumulates Content-Length and Cookie; response/4 supports extra response headers (used for Set-Cookie)"
    endpoints:
      - method: OPTIONS
        path: "/*"
        auth: none
        body: none
        response: "200 (CORS preflight headers)"

      - method: GET
        path: "/"
        auth: none
        body: none
        response: "200 text/html — serves build/frontend/index.html"

      - method: GET
        path: "/<file>"
        auth: none
        body: none
        response: "200 with inferred MIME type | 404"

      - method: GET
        path: "/auth/me"
        auth: "session cookie"
        body: none
        response: "200 application/json {\"username\":\"<username>\"} | 401 {\"error\":\"Unauthorized\"}"
        notes: "lightweight session check used by frontend on page load to restore login state"

      - method: GET
        path: "/value"
        auth: "session cookie"
        body: none
        response: "200 text/plain — current counter value as integer string | 401"

      - method: POST
        path: "/increment"
        auth: "session cookie"
        body: none
        response: "200 text/plain — new counter value as integer string | 401"

      - method: POST
        path: "/decrement"
        auth: "session cookie"
        body: none
        response: "200 text/plain — new counter value as integer string | 401"

      - method: POST
        path: "/reset"
        auth: "session cookie"
        body: none
        response: "200 text/plain — \"0\" | 401"

      - method: POST
        path: "/auth/register/begin"
        auth: none
        body:
          content_type: application/json
          fields:
            username: "string — the username to register"
        response_ok: |
          200 application/json
          { "challenge": "<base64url 32-byte random>",
            "userId":    "<base64url 16-byte random — NOT the username; avoids PII on authenticator>",
            "rpId":      "localhost",
            "rpName":    "Counter App" }
        response_err: "409 {\"error\":\"user_exists\"} | 400 {\"error\":\"bad_request\"}"

      - method: POST
        path: "/auth/register/complete"
        auth: none
        body:
          content_type: application/json
          fields:
            username:          "string — must match the username from register/begin"
            challenge:         "base64url string — the challenge returned by register/begin"
            attestationObject: "base64url string — CBOR-encoded attestationObject from navigator.credentials.create"
            clientDataJSON:    "base64url string — JSON blob from navigator.credentials.create"
        response_ok: |
          201 application/json
          Set-Cookie: session=<token>; HttpOnly; SameSite=Strict; Path=/
          { "status": "ok", "username": "<username>" }
        response_err: "400 {\"error\":\"<reason>\"} — expired | not_found | bad_type | bad_origin | challenge_mismatch | bad_rp_id | user_presence_required | ..."
        notes: "session token delivered as HttpOnly cookie, not in body; user is logged in immediately after registering"

      - method: POST
        path: "/auth/login/begin"
        auth: none
        body:
          content_type: application/json
          fields:
            username: "string — the username to authenticate"
        response_ok: |
          200 application/json
          { "challenge":        "<base64url 32-byte random>",
            "rpId":             "localhost",
            "allowCredentials": [ { "type": "public-key", "id": "<base64url credentialId>" }, ... ] }
        response_err: "404 {\"error\":\"user_not_found\"} | 400 {\"error\":\"bad_request\"}"

      - method: POST
        path: "/auth/login/complete"
        auth: none
        body:
          content_type: application/json
          fields:
            credentialId:      "base64url string — rawId from navigator.credentials.get assertion"
            authenticatorData: "base64url string — authenticatorData from assertion.response"
            clientDataJSON:    "base64url string — clientDataJSON from assertion.response (challenge extracted server-side)"
            signature:         "base64url string — signature from assertion.response"
        response_ok: |
          200 application/json
          Set-Cookie: session=<token>; HttpOnly; SameSite=Strict; Path=/
          { "username": "<username>" }
        response_err: "401 {\"error\":\"<reason>\"} — not_found | expired | credential_not_found | invalid_signature | sign_count_replay | ... | 400 {\"error\":\"bad_request\"}"
        notes: "session token delivered as HttpOnly cookie, not in body"

      - method: POST
        path: "/auth/logout"
        auth: "session cookie (token read from Cookie header, not body)"
        body:
          content_type: application/json
          fields: {}
          note: "body is ignored; session identified by the HttpOnly cookie"
        response_ok: |
          200 application/json
          Set-Cookie: session=; HttpOnly; SameSite=Strict; Path=/; Max-Age=0
          { "status": "ok" }
        response_err: "always 200 (delete_session is idempotent)"

  - name: auth_http
    path: "erlang/auth_http.erl"
    purpose: "Route handler functions called from counter_http; each returns {HttpCode, ExtraHeaders, JsonBody}"
    notes: "ExtraHeaders is [] or [{<<\"Set-Cookie\">>, Value}]; set_cookie/1 and clear_cookie/0 build the header values"
    handlers:
      - "handle_register_begin/1(Body)    → check user non-existence, generate random userId, create challenge → {200, [], JSON}"
      - "handle_register_complete/1(Body) → consume challenge, verify_registration, register_credential, create_session → {201, [set_cookie(Token)], JSON}"
      - "handle_login_begin/1(Body)       → get credentials, create challenge → {200, [], JSON}"
      - "handle_login_complete/1(Body)    → consume challenge, find_credential, verify_assertion, update_sign_count, create_session → {200, [set_cookie(Token)], JSON}"
      - "handle_logout/1(Token)           → delete_session → {200, [clear_cookie()], JSON}"

  - name: webauthn
    path: "erlang/webauthn.erl"
    purpose: "Pure-Erlang WebAuthn registration and assertion verification; no third-party deps"
    api:
      - "verify_registration/4(Username, ChallengeB64, AttObjB64, ClientDataB64) → {ok, Map} | {error, Reason}"
      - "verify_assertion/5(ChallengeB64, AuthDataB64, ClientDataB64, SigB64, StoredCred) → {ok, SignCount} | {error, Reason}"
    checks:
      - "clientDataJSON: type, origin (http://localhost:8080), challenge match (bytes comparison)"
      - "authData: rpIdHash (sha256 of 'localhost'), UP flag, AT flag (registration)"
      - "COSE key: EC2, P-256 (keys -2/-3 = X/Y coords, 32 bytes each)"
      - "public key: uncompressed 65-byte EC point (04 || X || Y)"
      - "signature: crypto:verify(ecdsa, sha256, SignedData, Sig, [PubKey, prime256v1])"
      - "attestation formats: 'none' (skip), 'packed' (self-attest, verify sig)"
      - "sign count: 0 always ok (platform auth); new > stored ok; otherwise sign_count_replay error"

  - name: webauthn_cbor
    path: "erlang/webauthn_cbor.erl"
    purpose: "Pure recursive-descent CBOR decoder for WebAuthn attestationObject and COSE keys"
    api:
      - "decode/1(Binary) → {ok, Value} | {error, cbor_decode_failed}"
    types: "uint(0), nint(1), bstr(2), tstr→binary(3), array(4), map(5)"
    notes: "Map keys decoded as-is (integers for COSE_Key, binaries for attestationObject)"

models:
  - name: counter (Mnesia record)
    path: "erlang/counter.erl"
    type: entity
    key_props: ["key (username binary or atom 'default')", "value (integer, default 0)"]
    storage: disc_copies

  - name: webauthn_user (Mnesia record)
    path: "erlang/auth.erl"
    type: entity
    key_props: ["username (binary)", "created_at (unix seconds)"]
    storage: disc_copies

  - name: webauthn_credential (Mnesia record)
    path: "erlang/auth.erl"
    type: entity
    key_props: ["credential_id (raw bytes)", "username (binary)", "public_key (65-byte EC point)", "sign_count (integer)"]
    storage: disc_copies
    notes: "secondary index on username field"

  - name: webauthn_challenge (Mnesia record)
    path: "erlang/auth.erl"
    type: entity
    key_props: ["challenge (32 raw bytes)", "username (binary)", "kind (atom: registration|authentication)", "created_at"]
    storage: disc_copies

  - name: webauthn_session (Mnesia record)
    path: "erlang/auth.erl"
    type: entity
    key_props: ["token (base64url binary)", "username (binary)", "expires_at (unix seconds)"]
    storage: disc_copies

clients:
  - name: counter_client
    path: "c/counter_client.c"
    purpose: "Interactive CLI REPL connecting to counter_server over TCP"
    protocol: "Uses counter_proto.h; commands: i/d/r/v/q"

  - name: counter_tests
    path: "c/counter_tests.c"
    purpose: "Automated test suite for counter_server; 12 named assertions; exits non-zero on failure"

  - name: counter_wasm
    path: "c/counter_wasm.c"
    purpose: "Emscripten WASM module; emscripten_fetch to counter_http API; handles 401"
    exports: ["increment()", "decrement()", "reset_counter()", "refresh()"]
    auth: "no auth header; browser sends HttpOnly session cookie automatically for same-origin requests"
    notes: "on_success checks fetch->status == 401 → calls Module.showAuthPanel(); no EM_JS bridge or Authorization header logic"

  - name: auth.js
    path: "frontend/auth.js"
    purpose: "Plain JS WebAuthn auth — register, login, logout, session check; no WASM"
    token_storage: "HttpOnly cookie set by server; JavaScript cannot read it; no window.__sessionToken"
    exports: ["authRegister()", "authLogin()", "authLogout()", "authCheckSession()", "_webauthn_available()"]
    flows:
      - "register: POST /auth/register/begin → navigator.credentials.create (uses opts.userId, not username) → POST /auth/register/complete → server sets session cookie → showCounterPanel"
      - "login:    POST /auth/login/begin → navigator.credentials.get → POST /auth/login/complete → server sets session cookie → showCounterPanel"
      - "logout:   POST /auth/logout (server clears cookie) → showAuthPanel"
      - "page load: GET /auth/me → if 200 showCounterPanel(username) else show auth panel"
    notes: |
      auth is plain JS (not WASM) because ceremonies are entirely fetch + navigator.credentials.
      _b64url uses a loop, not spread, to avoid call-stack overflow on large buffers.
      _err_msg wraps resp.json() in try/catch to handle non-JSON error responses (e.g. 502 HTML).
      _webauthn_available() checks window.PublicKeyCredential before calling the API.

shared:
  - name: counter_proto.h
    path: "c/counter_proto.h"
    purpose: "Shared C header — counter_connect() and counter_transact() used by client and tests"

relationships:
  - from: "auth.js"
    to: "counter_http"
    type: calls
    note: "fetch to /auth/* endpoints and /auth/me (unauthenticated); session maintained via HttpOnly cookie"
  - from: "counter_wasm"
    to: "counter_http"
    type: calls
    note: "emscripten_fetch POST/GET to /increment /decrement /reset /value; browser sends session cookie automatically"
  - from: "counter_http"
    to: "auth_http"
    type: calls
    note: "delegates /auth/* routes; wraps {Code, Headers, Body} result in HTTP response"
  - from: "counter_http"
    to: "auth"
    type: calls
    note: "validate_session(Token) → {ok, Username} to guard counter routes; Token from Cookie header"
  - from: "counter_http"
    to: "counter"
    type: calls
    note: "increment/decrement/reset/value with Username from validated session"
  - from: "auth_http"
    to: "auth"
    type: calls
    note: "create/consume challenges, register credentials, create/delete sessions"
  - from: "auth_http"
    to: "webauthn"
    type: calls
    note: "verify_registration and verify_assertion"
  - from: "webauthn"
    to: "webauthn_cbor"
    type: calls
    note: "decode attestationObject and COSE key bytes"
  - from: "counter_client"
    to: "counter_server"
    type: calls
    note: "TCP line protocol (port 9090) via counter_proto.h"
  - from: "counter_tests"
    to: "counter_server"
    type: calls
    note: "TCP line protocol (port 9090) via counter_proto.h"
  - from: "counter_server"
    to: "counter"
    type: calls
    note: "increment/decrement/reset/value with key=default (bypasses auth)"
  - from: "counter"
    to: "Mnesia"
    type: manages
    note: "disc_copies table; read/write via mnesia:transaction"
  - from: "auth"
    to: "Mnesia"
    type: manages
    note: "four disc_copies tables; read/write via mnesia:dirty_* ops"

build:
  tool: "make"
  targets:
    - "all   → compile C binaries and .beam files (7 beams)"
    - "wasm  → emcc counter_wasm.c → build/frontend/counter.js + copy index.html + copy auth.js"
    - "serve → all + wasm + kill :8080 + start counter_http on port 8080"
    - "test  → all + start counter_server + run counter_tests (TCP, no auth) + kill server"
    - "clean → rm -rf build/ erl_crash.dump"
  emflags: "-O2 -sFETCH (no -sASYNCIFY — counter_wasm uses callbacks not async/await)"
  artifacts: "build/ (gitignored)"
  mnesia_data: "Mnesia.nonode@nohost/ in working dir (gitignored)"

conventions:
  - "gen_server state is a placeholder (ok) when real state lives in Mnesia"
  - "auth gen_server API functions use mnesia:dirty_* directly — gen_server only needed for table init and hourly purge timer"
  - "counter Mnesia key is the username binary for HTTP clients; atom 'default' for TCP server"
  - "session token is an HttpOnly SameSite=Strict cookie named 'session'; JavaScript cannot read it"
  - "Cookie header extracted by collect_headers/2 via parse_session_cookie/1 during header drain"
  - "auth routes (/auth/*) are unauthenticated; all counter routes require validate_session"
  - "session_guard/4 in counter_http extracts Username from {ok, Username} and passes to counter_route/4"
  - "TCP server (port 9090) bypasses auth entirely — intended as internal/dev tool only"
  - "auth is plain JS (frontend/auth.js), not WASM — ceremonies are all fetch + navigator.credentials with no C-idiomatic work"
  - "register/complete creates a session immediately — user is logged in without a separate login step after registering"
  - "register/begin returns a random userId (not the username) to avoid storing PII on the authenticator"
  - "C client/tests share socket logic via counter_proto.h (shared header, not a library)"
  - "HTTP server uses {packet, http_bin} for parsing then switches to raw for response"
  - "auth_http handlers return {Code, ExtraHeaders, Body} 3-tuples; counter_http passes ExtraHeaders to response/4"
  - "make test clears port 9090 before starting to ensure a clean server each run"
